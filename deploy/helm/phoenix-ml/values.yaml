replicaCount: 2

image:
  repository: phoenix-ml-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

grpc:
  enabled: true
  port: 50051
  service:
    type: ClusterIP

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: phoenix-ml.local
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

config:
  appVersion: "0.1.0"
  logLevel: "INFO"
  batchMaxSize: "32"
  batchMaxWaitMs: "10"
  modelCacheDir: "/tmp/phoenix/model_cache"

secrets:
  databaseUrl: "postgresql+asyncpg://user:pass@phoenix-db:5432/phoenix"
  redisUrl: "redis://phoenix-redis:6379"
  kafkaUrl: "phoenix-kafka:9092"
  mlflowTrackingUri: "http://phoenix-mlflow:5000"
