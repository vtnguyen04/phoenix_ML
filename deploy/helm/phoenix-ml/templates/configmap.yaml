apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app: {{ .Release.Name }}
data:
  APP_VERSION: {{ .Values.config.appVersion | default "0.1.0" | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | default "INFO" | quote }}
  BATCH_MAX_SIZE: {{ .Values.config.batchMaxSize | default "32" | quote }}
  BATCH_MAX_WAIT_MS: {{ .Values.config.batchMaxWaitMs | default "10" | quote }}
  MODEL_CACHE_DIR: {{ .Values.config.modelCacheDir | default "/tmp/phoenix/model_cache" | quote }}
  GRPC_PORT: {{ .Values.grpc.port | default 50051 | quote }}
