replicaCount: 2

image:
  repository: phoenix-ml-api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - host: phoenix-ml.local
      paths:
        - path: /
          pathType: ImplementationSpecific

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

env:
  - name: DATABASE_URL
    value: "postgresql+asyncpg://user:pass@phoenix-db:5432/phoenix"
  - name: REDIS_URL
    value: "redis://phoenix-redis:6379"
  - name: KAFKA_URL
    value: "phoenix-kafka:9092"
