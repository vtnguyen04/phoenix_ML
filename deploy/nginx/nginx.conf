# ── Nginx reverse proxy + load balancer ──────────────────────────
# Deploy: docker run -v $(pwd)/deploy/nginx/nginx.conf:/etc/nginx/nginx.conf nginx

upstream phoenix_api {
    # Multiple uvicorn workers behind Nginx
    server api:8000;
    # Add more API instances for horizontal scaling:
    # server api-2:8000;
    # server api-3:8000;

    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Rate limiting at proxy level ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=60r/m;

    # ── Health check (bypass rate limit) ─────────────────────────
    location /health {
        proxy_pass http://phoenix_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /metrics {
        proxy_pass http://phoenix_api;
        proxy_set_header Host $host;
    }

    # ── API v1 routes ────────────────────────────────────────────
    location /api/v1/predict {
        limit_req zone=predict_limit burst=20 nodelay;
        proxy_pass http://phoenix_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://phoenix_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Swagger docs ─────────────────────────────────────────────
    location /docs {
        proxy_pass http://phoenix_api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://phoenix_api;
        proxy_set_header Host $host;
    }

    # ── WebSocket support ────────────────────────────────────────
    location /ws/ {
        proxy_pass http://phoenix_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ── Default fallback ─────────────────────────────────────────
    location / {
        proxy_pass http://phoenix_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
