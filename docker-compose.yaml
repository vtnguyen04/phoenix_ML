# ═══════════════════════════════════════════════════════════════════════
# Phoenix ML Platform — Full Stack Docker Compose
#
# Services: api, frontend, postgres, redis, kafka, prometheus, grafana,
#           jaeger, mlflow, minio
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f api    # follow API logs
#   docker compose down -v        # stop and remove volumes
# ═══════════════════════════════════════════════════════════════════════

services:
  # ─── ML API Service ─────────────────────────────────────────────
  api:
    build: .
    container_name: phoenix-api
    ports:
      - "8001:8000"
      - "50051:50051"
    environment:
      - REDIS_URL=redis://redis:6379
      - KAFKA_URL=kafka:9092
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - USE_REDIS=true
      - JAEGER_ENDPOINT=http://jaeger:4317
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DEFAULT_MODEL_ID=${DEFAULT_MODEL_ID:-credit-risk}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      kafka:
        condition: service_started
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./models:/app/models
      - ./src:/app/src
      - ./data:/app/data
      - ./model_configs:/app/model_configs
      - ./pyproject.toml:/app/pyproject.toml:ro
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── Frontend Dashboard ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: phoenix-frontend
    ports:
      - "5174:5173"
    environment:
      - VITE_API_TARGET=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: phoenix-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── Redis (Feature Store + Cache) ──────────────────────────────
  redis:
    image: redis:alpine
    container_name: phoenix-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── Kafka (KRaft mode, no Zookeeper) ──────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: phoenix-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
    ports:
      - "9094:9092"
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── Kafka UI (Web Management) ──────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: phoenix-kafka-ui
    ports:
      - "8082:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=phoenix
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── MLflow (Model Registry + Experiment Tracking) ─────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    container_name: phoenix-mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install --quiet psycopg2-binary &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      --default-artifact-root /mlflow/artifacts"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── Prometheus (Metrics Collection) ───────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: phoenix-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── Grafana (Dashboards) ──────────────────────────────────────
  grafana:
    image: grafana/grafana
    container_name: phoenix-grafana
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── Jaeger (Distributed Tracing) ─────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: phoenix-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - phoenix-net

  # ─── MinIO (S3-compatible Object Storage for MLflow Artifacts) ──
  minio:
    image: minio/minio:latest
    container_name: phoenix-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - phoenix-net

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb myminio/mlflow-artifacts --ignore-existing;
      mc anonymous set download myminio/mlflow-artifacts;
      exit 0;
      "
    networks:
      - phoenix-net

# ─── Volumes ──────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  mlflow-artifacts:
  minio-data:

# ─── Networks ─────────────────────────────────────────────────────
networks:
  phoenix-net:
    driver: bridge
