# ─── DVC Pipeline — Model-Agnostic ──────────────────────────────
# Each stage references the example training scripts.
# Adapt paths and commands for your specific ML problem type.
# ─────────────────────────────────────────────────────────────────
stages:
  train-credit-risk:
    cmd: uv run python examples/credit_risk/train.py
    deps:
      - examples/credit_risk/train.py
    outs:
      - models/credit_risk/v1/model.onnx
    metrics:
      - models/credit_risk/v1/metrics.json:
          cache: false

  train-house-price:
    cmd: uv run python examples/house_price/train.py
    deps:
      - examples/house_price/train.py
    outs:
      - models/house_price/v1/model.onnx
    metrics:
      - models/house_price/v1/metrics.json:
          cache: false

  train-fraud-detection:
    cmd: uv run python examples/fraud_detection/train.py
    deps:
      - examples/fraud_detection/train.py
    outs:
      - models/fraud_detection/v1/model.onnx
    metrics:
      - models/fraud_detection/v1/metrics.json:
          cache: false

  train-image-classification:
    cmd: uv run python examples/image_classification/train.py
    deps:
      - examples/image_classification/train.py
    outs:
      - models/image_class/v1/model.onnx
    metrics:
      - models/image_class/v1/metrics.json:
          cache: false

  seed-features:
    cmd: uv run python scripts/seed_features.py
    deps:
      - scripts/seed_features.py
    outs:
      - data/reference_features.json
      - data/reference_data.json
