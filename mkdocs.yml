site_name: Phoenix ML Platform
site_description: High-Throughput Real-time ML Inference System
site_author: Võ Thành Nguyễn
repo_url: https://github.com/vtnguyen04/phoenix_ML
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.tooltips
    - search.suggest
    - search.highlight
  font:
    text: Inter
    code: Fira Code
  palette:
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - attr_list

nav:
  - Welcome: index.md
  - Getting Started:
    - Quick Start: guides/getting-started.md
    - Tutorials:
      - Sentiment Analysis: tutorials/sentiment-analysis.md
      - Credit Risk: tutorials/credit-risk.md
      - Fraud Detection: tutorials/fraud-detection.md
      - House Price: tutorials/house-price.md
      - Image Classification: tutorials/image-classification.md
  - Core Concepts:
    - Architecture: architecture/system-design.md
    - Project Structure: project-structure.md
    - Frontend: frontend/architecture.md
  - Operations & Guides:
    - Library API: guides/library-api.md
    - Deployment Stack: deployment/docker-stack.md
    - Monitoring & Alerting: guides/monitoring.md
    - Customization: guides/customization.md
    - Troubleshooting: guides/troubleshooting.md
  - API Reference: api/reference.md
  - Architecture Decisions:
    - 002 - ONNX Runtime: adr/002-use-onnx-runtime.md
    - 003 - Kafka Streaming: adr/003-use-kafka-for-event-streaming.md
    - 004 - Observability: adr/004-observability-with-prometheus-grafana.md
    - 005 - DVC Versioning: adr/005-dvc-data-versioning.md
  - Engineering Blog:
    - System Design: blog/system-design-overview.md
    - Self-Healing ML: blog/self-healing-ml.md
    - Performance: blog/performance-optimization.md